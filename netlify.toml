[build]
  publish = "public"
  functions = "netlify/functions"
  command = ""

[functions]
  node_bundler = "esbuild"

# Never cache the service worker file itself at the CDN edge — it must
# always be re-fetched so browsers see updates promptly (see public/sw.js
# for the client-side cache-versioning story).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
